name: Sinkronisasi ke Bitbucket

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode dari GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dorong Kode ke Bitbucket
        run: |
          echo "machine bitbucket.org login ${{ secrets.BITBUCKET_USERNAME }} password ${{ secrets.BITBUCKET_PASSWORD }}" > ~/.netrc
          git remote add bitbucket https://bitbucket.org/radyalabsdev/docs.jangkau.git
          git push bitbucket main --force